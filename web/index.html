<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sufian's Portfolio Website in Flutter">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sufian | Portfolio</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    body {
      /* Matches your deep navy dark theme background */
      background-color: #0A0E17;
      margin: 0;
      overflow: hidden;
    }
    #loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      background-color: #0A0E17;
      transition: opacity 0.6s ease-out; /* Smooth fade out */
    }
  </style>
</head>
<body>

<div id="loading-container">
  <lottie-player
          src="animation.json"  background="transparent"
          speed="1"
          style="width: 300px; height: 300px;"
          loop
          autoplay>
  </lottie-player>
</div>

<script>
  // This listens for Flutter to finish loading and paint its first frame
  window.addEventListener('flutter-first-frame', function() {
    var loader = document.getElementById('loading-container');
    if (loader) {
      // Start the fade out
      loader.style.opacity = '0';

      // Remove it from the DOM completely after the fade transition finishes
      setTimeout(function() {
        loader.remove();
      }, 600);
    }
  });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
